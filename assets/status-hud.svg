<svg xmlns="http://www.w3.org/2000/svg" width="900" height="74" viewBox="0 0 900 74" role="img" aria-label="Live status HUD">
  <defs>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="74" rx="14" fill="#0D1117" stroke="#30363D"/>

  <!-- Online pulse -->
  <rect x="18" y="16" width="150" height="42" rx="10" fill="url(#pill)" stroke="#FFD700" stroke-width="1.5"/>
  <circle cx="44" cy="37" r="6" fill="#FFD700">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="62" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" font-weight="700" fill="#FFD700">ONLINE</text>

  <!-- Systems -->
  <rect x="184" y="16" width="210" height="42" rx="10" fill="url(#pill)" stroke="#3FB950" stroke-width="1.5"/>
  <text x="204" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#3FB950">SYSTEMS NOMINAL</text>

  <!-- Patent -->
  <rect x="410" y="16" width="200" height="42" rx="10" fill="url(#pill)" stroke="#ED1C24" stroke-width="1.5"/>
  <text x="430" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#ED1C24">PATENT HOLDER</text>

  <!-- Build -->
  <rect x="626" y="16" width="256" height="42" rx="10" fill="url(#pill)" stroke="#58A6FF" stroke-width="1.5"/>
  <text x="646" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#58A6FF">BUILDING DEVMIND AI</text>
  <rect x="840" y="30" width="18" height="14" fill="#58A6FF">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
